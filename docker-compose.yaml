version: "3.8"
services:
  app:
    image: badzboss/shorten-url:latest
    container_name: shorten-url-app
    volumes:
      - ./.env:/.env
      - /root/shorten-url/temp:/temp
    ports:
      - "8085:8085"
    networks:
      - shorten-url-shared

networks:
  shorten-url-shared:
    external: true
